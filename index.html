<!doctype html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Window Quote Pro</title>

<style>
body {font-family: Arial; background:#f3f6fb; margin:0; padding:20px;}
.card {background:#fff; padding:20px; border-radius:12px; margin-bottom:20px;}
input, select {width:100%; padding:10px; margin:5px 0;}
button {padding:10px 15px; border:none; border-radius:8px; cursor:pointer;}
.primary {background:#1e66ff; color:white;}
</style>

</head>
<body>

<h1>Window Quote Pro</h1>

<div class="card">
<h2>Create Quote</h2>

<input id="name" placeholder="Customer Name">
<input id="email" placeholder="Customer Email">

<input id="windows" type="number" placeholder="Windows">
<input id="tracks" type="number" placeholder="Tracks">

<button class="primary" onclick="calculate()">Calculate</button>

<h2 id="price">$0</h2>

<button onclick="emailQuote()">Open Email</button> <button onclick="saveJob()">Save Team Job (Pro)</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

// 🔥 PUT YOUR KEYS HERE
const SUPABASE_URL = "https://cwrlnfcgryhmohopdwrs.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_cZS7gdA_x9PVboQs1bFoYA_I2YTaUaM";
function calculate(){
  let w = Number(document.getElementById("windows").value || 0);
  let t = Number(document.getElementById("tracks").value || 0);
  let price = w * 20 + t * 5;
  document.getElementById("price").innerText = "$" + price;
}

function emailQuote(){
  let body = "Window Quote Pro\nPrice: " + document.getElementById("price").innerText;
  window.location.href = "mailto:?body=" + encodeURIComponent(body);
}

// 🔥 PRO FEATURE
async function saveJob(){
  const { data, error } = await supabase
    .from('jobs')
    .insert([{ 
      customer_name: document.getElementById("name").value,
      price: document.getElementById("price").innerText
    }]);

  if(error){
    alert("Error: " + error.message);
  } else {
    alert("Saved to team!");
  }
}

</script>

</body>
</html>
